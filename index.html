<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Applied Generative AI — Interaction Lab</title>
<style>
  :root{ --ink:#c9f7ff; --cy:#46f0ff; --dim:#5b7a8a; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#030509}
  body{font-family:"SF Mono","Cascadia Mono",Consolas,"Roboto Mono",monospace;color:var(--ink)}
  #cv{position:fixed;inset:0;display:block}
  .hud{position:fixed;z-index:10;pointer-events:none}
  #title{top:18px;left:50%;transform:translateX(-50%);text-align:center}
  #title .eyebrow{font-size:10px;letter-spacing:.45em;color:var(--dim);text-transform:uppercase}
  #title h1{font-size:clamp(15px,2.2vw,24px);letter-spacing:.28em;font-weight:600;color:var(--cy);
    text-shadow:0 0 18px rgba(70,240,255,.55);text-transform:uppercase;margin-top:4px}
  #pagename{bottom:64px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase}
  #dots{bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:12px;pointer-events:auto;flex-wrap:wrap;justify-content:center;max-width:80vw}
  .dot{width:11px;height:11px;border-radius:50%;border:1px solid var(--dim);cursor:pointer;transition:all .25s;background:transparent}
  .dot.on{background:var(--cy);box-shadow:0 0 12px var(--cy);border-color:var(--cy)}
  .navbtn{position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:60px;height:104px;
    background:rgba(70,240,255,.04);border:1px solid rgba(70,240,255,.28);border-radius:14px;color:var(--cy);
    font-size:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(2px);transition:.2s}
  .navbtn:active{background:rgba(70,240,255,.18);box-shadow:0 0 24px rgba(70,240,255,.35)}
  #prev{left:14px}#next{right:14px}
  .navbtn.hidden{opacity:0;pointer-events:none}
  #resetBtn,#muteBtn{position:fixed;z-index:10;bottom:24px;padding:10px 16px;font-family:inherit;font-size:10px;
    letter-spacing:.3em;text-transform:uppercase;color:var(--ink);cursor:pointer;background:rgba(70,240,255,.05);
    border:1px solid rgba(70,240,255,.3);border-radius:10px}
  #resetBtn{right:24px}#muteBtn{left:24px}
  #resetBtn:active,#muteBtn:active{background:rgba(70,240,255,.2)}
  #fps{position:fixed;top:14px;right:18px;z-index:10;font-size:10px;color:var(--dim);letter-spacing:.2em;display:none}
  .corner{position:fixed;width:34px;height:34px;z-index:9;border-color:rgba(70,240,255,.35);border-style:solid;border-width:0}
  #c1{top:10px;left:10px;border-top-width:1px;border-left-width:1px}
  #c2{top:10px;right:10px;border-top-width:1px;border-right-width:1px}
  #c3{bottom:10px;left:10px;border-bottom-width:1px;border-left-width:1px}
  #c4{bottom:10px;right:10px;border-bottom-width:1px;border-right-width:1px}
</style>
</head>
<body>
<div class="hud" id="title"><div class="eyebrow">Applied Generative AI · Module 1</div><h1 id="titleText">Interaction Lab</h1></div>
<div class="hud" id="pagename">—</div>
<div class="hud" id="dots"></div>
<div class="navbtn hidden" id="prev">&lsaquo;</div>
<div class="navbtn" id="next">&rsaquo;</div>
<button id="muteBtn">Sound: On</button>
<button id="resetBtn">Reset Page</button>
<div id="fps"></div>
<div class="corner" id="c1"></div><div class="corner" id="c2"></div>
<div class="corner" id="c3"></div><div class="corner" id="c4"></div>

<script src="vendor/three.min.js"></script>
<script src="vendor/CopyShader.js"></script>
<script src="vendor/LuminosityHighPassShader.js"></script>
<script src="vendor/RGBShiftShader.js"></script>
<script src="vendor/EffectComposer.js"></script>
<script src="vendor/RenderPass.js"></script>
<script src="vendor/ShaderPass.js"></script>
<script src="vendor/MaskPass.js"></script>
<script src="vendor/UnrealBloomPass.js"></script>
<script src="engine.js"></script>
<script src="page1.js"></script>
<script src="page2.js"></script>
<script src="page3.js"></script>
<script src="page4.js"></script>
<script src="page5.js"></script>
<script src="page6.js"></script>
<script src="page7.js"></script>
<script src="page8.js"></script>
</body></html>
