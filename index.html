<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Applied Generative AI — Interaction Lab</title>
<style>
  :root{ --ink:#eaf9ff; --cy:#46f0ff; --dim:#7fa3b8; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none}
  html,body{width:100%;height:100%;overflow:hidden;background:#060912}
  body{font-family:"SF Mono","Cascadia Mono",Consolas,"Roboto Mono",monospace;color:var(--ink)}
  #cv{position:fixed;top:0;left:0;display:block;touch-action:none}
  .hud{position:fixed;z-index:10;pointer-events:none}
  #title{top:16px;left:50%;transform:translateX(-50%);text-align:center}
  #title .eyebrow{font-size:10px;letter-spacing:.4em;color:var(--dim);text-transform:uppercase}
  #title h1{font-size:clamp(15px,2.1vw,22px);letter-spacing:.24em;font-weight:700;color:var(--cy);
    text-transform:uppercase;margin-top:4px}
  #pagename{bottom:60px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:.35em;color:var(--dim);text-transform:uppercase}
  #dots{bottom:28px;left:50%;transform:translateX(-50%);display:flex;gap:11px;pointer-events:auto;flex-wrap:wrap;justify-content:center;max-width:80vw}
  .dot{width:10px;height:10px;border-radius:50%;border:1px solid var(--dim);cursor:pointer;transition:all .25s;background:transparent}
  .dot.on{background:var(--cy);box-shadow:0 0 10px var(--cy);border-color:var(--cy)}
  .navbtn{position:fixed;top:50%;transform:translateY(-50%);z-index:10;width:54px;height:96px;
    background:rgba(70,240,255,.05);border:1px solid rgba(70,240,255,.28);border-radius:12px;color:var(--cy);
    font-size:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.2s}
  .navbtn:active{background:rgba(70,240,255,.18)}
  #prev{left:12px}#next{right:12px}
  .navbtn.hidden{opacity:0;pointer-events:none}
  #resetBtn,#muteBtn{position:fixed;z-index:10;bottom:20px;padding:9px 15px;font-family:inherit;font-size:10px;
    letter-spacing:.28em;text-transform:uppercase;color:var(--ink);cursor:pointer;background:rgba(70,240,255,.05);
    border:1px solid rgba(70,240,255,.3);border-radius:8px}
  #resetBtn{right:20px}#muteBtn{left:20px}
  #resetBtn:active,#muteBtn:active{background:rgba(70,240,255,.2)}
  #fps{position:fixed;top:14px;right:16px;z-index:10;font-size:10px;color:var(--dim);letter-spacing:.2em;display:none}
</style>
</head>
<body>
<div class="hud" id="title"><div class="eyebrow">Applied Generative AI · Module 1</div><h1 id="titleText">Interaction Lab</h1></div>
<div class="hud" id="pagename">—</div>
<div class="hud" id="dots"></div>
<div class="navbtn hidden" id="prev">&lsaquo;</div>
<div class="navbtn" id="next">&rsaquo;</div>
<button id="muteBtn">Sound: On</button>
<button id="resetBtn">Reset Page</button>
<div id="fps"></div>

<canvas id="cv"></canvas>

<script src="engine.js"></script>
<script src="page1.js"></script>
<script src="page2.js"></script>
<script src="page3.js"></script>
<script src="page4.js"></script>
<script src="page5.js"></script>
<script src="page6.js"></script>
<script src="page7.js"></script>
<script src="page8.js"></script>
</body>
</html>
